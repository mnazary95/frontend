<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=yes"><title>JPRO Territory CRM</title><style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;overflow:hidden;height:100vh;position:relative}
#map{width:100%;height:100%;z-index:1}
#load{position:fixed;inset:0;background:#1a1a2e;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff}
#load h2{margin-bottom:10px;font-size:20px}
.spinner{width:40px;height:40px;border:4px solid #333;border-top:4px solid #f39c12;border-radius:50%;animation:spin 1s linear infinite;margin-top:15px}
@keyframes spin{to{transform:rotate(360deg)}}
#panel{position:fixed;top:0;right:0;width:100%;max-width:400px;height:100vh;background:#1e1e2e;z-index:10000;transform:translateX(100%);transition:transform .3s;overflow-y:auto;color:#ddd;box-shadow:-4px 0 20px rgba(0,0,0,.5)}
#panel.open{transform:translateX(0)}
#panel h2{padding:15px;background:#2a2a3e;margin:0;font-size:16px;display:flex;justify-content:space-between;align-items:center}
#panel .close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:5px 10px}
#panel .meta{padding:10px 15px;color:#aaa;font-size:13px;border-bottom:1px solid #333}
#panel .field{padding:8px 15px;font-size:14px}
#panel .field label{display:block;color:#888;font-size:11px;text-transform:uppercase;margin-bottom:3px}
#panel .phone{color:#f39c12;text-decoration:none}
#panel .trip-actions{padding:10px 15px;border-bottom:1px solid #333}
#panel .trip-actions button{width:100%;padding:10px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:14px}
#panel .trip-actions .btn-trip.add{background:#f39c12;color:#1a1a2e}
#panel .trip-actions .btn-trip.remove{background:#c0392b;color:#fff}
.btn-hide{width:100%;padding:6px;margin-top:4px;background:transparent;border:1px solid #c0392b;color:#c0392b;border-radius:6px;cursor:pointer;font-size:12px;opacity:.7;transition:opacity .2s}
.btn-hide:hover{opacity:1;background:rgba(192,57,43,.1)}
#panel .schedule-section{padding:10px 15px;border-bottom:1px solid #333}
#panel .schedule-section label{display:block;color:#888;font-size:11px;text-transform:uppercase;margin-bottom:8px}
#panel .schedule-row{display:flex;gap:6px}
#panel .schedule-row button{padding:8px 12px;background:#27ae60;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:13px;white-space:nowrap}
#panel .sched-chip{display:inline-block;background:#2a4a3e;color:#27ae60;padding:4px 10px;border-radius:12px;font-size:12px;margin:4px 4px 0 0}
#panel .visits{border-top:1px solid #333;padding:10px 15px}
#panel .visits h3{font-size:14px;margin-bottom:8px}
#panel .visit-entry{background:#2a2a3e;padding:8px;margin-bottom:5px;border-radius:4px;position:relative;font-size:12px}
#panel .visit-entry .del{position:absolute;top:5px;right:8px;background:#c0392b;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;line-height:1}
#panel .visit-entry .vt{color:#888;font-size:11px}
#panel .visit-entry .vn{margin-top:3px;white-space:pre-wrap}
#panel .add-visit{padding:10px 15px;border-top:1px solid #333}
#panel .add-visit textarea{width:100%;height:60px;background:#2a2a3e;border:1px solid #444;color:#ddd;padding:8px;border-radius:4px;font-family:inherit;font-size:13px;resize:vertical}
#panel .add-visit button{margin-top:8px;background:#27ae60;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-weight:600;width:100%}
#panel .status-bar{display:flex;gap:5px;padding:10px 15px;border-bottom:1px solid #333}
#panel .status-bar button{flex:1;padding:8px 5px;border:1px solid #555;background:transparent;color:#888;border-radius:4px;cursor:pointer;font-size:11px;transition:.2s}
#panel .status-bar button.active{color:#fff;border-color:currentColor}
#panel .status-bar button:nth-child(1).active{border-color:#e74c3c;color:#e74c3c}
#panel .status-bar button:nth-child(2).active{border-color:#f39c12;color:#f39c12}
#panel .status-bar button:nth-child(3).active{border-color:#27ae60;color:#27ae60}
#tripPanel{position:fixed;top:0;left:0;width:100%;max-width:380px;height:100vh;background:#1e1e2e;z-index:10001;transform:translateX(-100%);transition:transform .3s;overflow-y:auto;color:#ddd;box-shadow:4px 0 20px rgba(0,0,0,.5)}
#tripPanel.open{transform:translateX(0)}
#tripPanel h2{padding:15px;background:#2a2a3e;margin:0;font-size:16px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #f39c12}
#tripPanel .close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:5px 10px}
.trip-header{display:flex;gap:8px;padding:10px}
.trip-header input{flex:1;padding:8px 10px;background:#2a2a3e;border:1px solid #444;color:#ddd;border-radius:6px;font-size:13px;font-family:inherit}
.trip-header input[type="date"]{flex:0 0 auto;width:140px;color-scheme:dark}
.trip-header input::placeholder{color:#666}
.trip-list{padding:10px}
.trip-stop{display:flex;align-items:center;gap:8px;padding:10px;background:#2a2a3e;border-radius:6px;margin-bottom:8px;position:relative;transition:opacity .15s,background .15s;user-select:none;-webkit-user-select:none}
.trip-grip{cursor:grab;color:#555;font-size:18px;padding:0 4px;flex-shrink:0;line-height:1;user-select:none;-webkit-user-select:none;touch-action:none}
.trip-grip:active{cursor:grabbing}
.trip-num{background:#f39c12;color:#1a1a2e;width:26px;height:26px;border-radius:50%;text-align:center;line-height:26px;font-weight:bold;font-size:13px;flex-shrink:0}
.trip-info{flex:1;min-width:0}
.trip-name{font-weight:600;font-size:14px;margin-bottom:2px}
.trip-meta{font-size:11px;color:#888}
.trip-dist{font-size:11px;color:#f39c12;margin-top:3px}
.trip-remove{background:none;border:1px solid #555;color:#aaa;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.trip-summary{padding:10px 15px;background:#2a2a3e;margin:0 10px 10px;border-radius:6px;text-align:center;font-weight:600;color:#f39c12;font-size:14px}
.trip-buttons{padding:10px;display:flex;flex-direction:column;gap:6px}
.trip-buttons button{padding:10px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;background:#f39c12;color:#1a1a2e}
.trip-buttons button.ghost{background:transparent;border:1px solid #555;color:#aaa}
.saved-trips-section{margin-top:10px;border-top:1px solid #333;padding:10px}
.saved-trips-section h3{font-size:13px;color:#888;margin-bottom:8px;padding:0 5px}
.saved-empty{text-align:center;color:#555;font-size:12px;padding:15px}
.saved-list{display:flex;flex-direction:column;gap:6px}
.saved-trip{display:flex;align-items:center;background:#2a2a3e;padding:8px 10px;border-radius:6px;gap:8px}
.saved-info{flex:1;min-width:0}
.saved-name{font-size:13px;font-weight:600}
.saved-meta{font-size:11px;color:#888}
.saved-actions{display:flex;gap:4px}
.saved-actions button{background:none;border:1px solid #444;color:#888;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.saved-actions button:hover{background:#3a3a4e;color:#fff}
#tripBadge{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:#f39c12;color:#1a1a2e;padding:8px 18px;border-radius:20px;font-weight:700;font-size:14px;z-index:9999;cursor:pointer;display:none;box-shadow:0 2px 10px rgba(243,153,18,.4);white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#tripBadge:hover{background:#f5a732}
#controls{position:fixed;top:10px;left:10px;z-index:9998;width:calc(100% - 20px);max-width:360px}
#controls input,#controls select{width:100%;padding:10px;margin-bottom:5px;background:#2a2a3e;border:1px solid #444;color:#ddd;border-radius:6px;font-size:14px;font-family:inherit}
#controls input::placeholder{color:#666}
#controls .ctrls{display:flex;gap:5px;flex-wrap:wrap}
#controls .ctrls select{flex:1;min-width:100px}
#controls .ctrls button{padding:8px 12px;background:#f39c12;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;white-space:nowrap}
#controls .ctrls button.ghost{background:transparent;border:1px solid #555;color:#aaa}
#dateBadge{display:none;padding:5px 12px;border-radius:14px;font-size:12px;font-weight:600;cursor:pointer;background:#2a2a3e;color:#27ae60;border:1px solid #444;white-space:nowrap}
#dateBadge.active{background:#27ae60;color:#fff;border-color:#27ae60}
#dateBadge:hover{opacity:.85}
.btn-clear-date{background:transparent!important;border:1px solid #c0392b!important;color:#c0392b!important;padding:4px 10px!important;border-radius:14px!important;font-size:11px!important;cursor:pointer!important;display:none!important}
.btn-clear-date.visible{display:inline-block!important}
#counter{position:fixed;bottom:10px;left:10px;background:rgba(26,26,46,.9);color:#aaa;padding:6px 12px;border-radius:4px;font-size:12px;z-index:9998}
#legend{position:fixed;bottom:10px;right:10px;background:rgba(26,26,46,.95);padding:8px 12px;border-radius:6px;font-size:11px;z-index:9998;max-height:200px;overflow-y:auto;color:#aaa;max-width:220px}
#legend .li{display:flex;align-items:center;gap:5px;margin:2px 0}
#legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@media(max-width:600px){#controls input,#controls select{padding:8px;font-size:13px}#panel,#tripPanel{max-width:100%}.trip-header{flex-direction:column}.trip-header input[type="date"]{width:100%}#tripBadge{bottom:40px;font-size:12px;padding:6px 12px}}</style></head><body><div id="map"></div><div id="load"><h2>Loading 1356 leads...</h2><div class="spinner"></div><p id="errMsg" style="display:none;color:#e74c3c;margin-top:15px;text-align:center;font-size:14px;max-width:300px"></p></div>
<div id="controls"><input type="text" id="search" placeholder="Search by name, city, industry..."><div class="ctrls"><select id="indFilter"><option value="">All Industries</option></select><select id="cityFilter"><option value="">All Cities</option></select><select id="statusFilter"><option value="all">All Status</option><option value="0">Not Visited</option><option value="1">Contacted</option><option value="2">Visited</option></select></div><div class="ctrls" style="margin-top:5px;align-items:center"><select id="dateFilter" style="flex:2"><option value="">All Dates</option></select><button id="dateBadge" onclick="clearDateFilter()" style="display:none">📅</button><button id="btnClearDate" class="btn-clear-date" onclick="clearDateFilter()" style="display:none">✕ Clear</button></div><div class="ctrls" style="margin-top:5px"><button onclick="exportCSV('all')">Export All</button><button onclick="exportCSV('visits')">Export Visits</button><button class="ghost" onclick="resetFilters()">Reset</button><button class="ghost" onclick="restoreHidden()" style="display:none" id="restoreHiddenBtn">Restore Hidden</button></div></div>
<div id="counter">0 leads</div><div id="legend"></div>
<button id="tripBadge" onclick="toggleTripPanel()">📍 0 stops</button>
<div id="tripPanel"><h2>🛣️ <span id="tripTitle">Trip Planner</span><button class="close" onclick="toggleTripPanel()">✕</button></h2><div id="tripBody" style="padding:10px"></div></div>
<div id="panel"><h2><span id="panelTitle">Details</span><button class="close" onclick="closePanel()">✕</button></h2><div id="panelBody"></div></div>

l=LEADS[s.idx];var icon=L.divIcon({html:'<div style="background:#f39c12;color:#1a1a2e;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-weight:bold;font-size:12px;border:2px solid #fff">'+(i+1)+'</div>',iconSize:[26,26],iconAnchor:[13,13]});var mk=L.marker([l[5],l[6]],{icon:icon}).addTo(map);routeMarkers.push(mk);});}function toggleTripPanel(){var p=document.getElementById("tripPanel");p.classList.toggle("open");if(p.classList.contains("open"))renderTripPanel();}function renderTripPanel(){var stops=tripData.stops;var h="";h+='<div class="trip-header"><input type="date" id="tripDate" value="'+tripData.date+'" onchange="tripData.date=this.value;saveTrip();updateTripBadge();" placeholder="Select date"><input type="text" id="tripName" value="'+escapeHtml(tripData.name||"")+'" placeholder="Trip name" onchange="tripData.name=this.value;saveTrip();" maxlength="40"></div>';if(stops.length===0){h+='<div style="padding:20px;text-align:center;color:#888"><p style="font-size:40px;margin-bottom:10px">\ud83d\uddfa\ufe0f</p><p>No stops yet.</p></div>';}else{var totalDist=0;h+='<div class="trip-list" id="tripList">';stops.forEach(function(s,i){var l=LEADS[s.idx];var dist="";if(i>0){var prev=LEADS[stops[i-1].idx];dist=haversine(prev[5],prev[6],l[5],l[6]).toFixed(1)+" km";totalDist+=parseFloat(dist);}h+='<div class="trip-stop" data-trip-idx="'+i+'"><div class="trip-grip" onmousedown="dragStart(event,'+i+')" ontouchstart="dragStart(event,'+i+')">\u2630</div><div class="trip-num">'+(i+1)+'</div><div class="trip-info"><div class="trip-name">'+l[0]+'</div><div class="trip-meta">'+l[1]+' \u00b7 '+l[2]+'</div>'+(dist?'<div class="trip-dist">\u2192 '+dist+'</div>':'')+'</div><button class="trip-remove" onclick="toggleTripStop('+s.idx+');renderTripPanel();refreshMarkers();">\u2715</button></div>';});h+='</div>';h+='<div class="trip-summary">Total: ~'+totalDist.toFixed(1)+' km \u00b7 '+stops.length+' stops</div>';h+='<div class="trip-buttons"><button onclick="op
